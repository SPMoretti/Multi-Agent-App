<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Multi-Agent AI</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f1117;
      --surface:   #1a1d27;
      --border:    #2e3148;
      --accent:    #6c63ff;
      --accent2:   #a78bfa;
      --text:      #e2e8f0;
      --muted:     #94a3b8;
      --user-bg:   #1e2a45;
      --bot-bg:    #1a1d27;
      --radius:    12px;
      --font:      'Inter', system-ui, sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ── LOGIN SCREEN ── */
    #login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100dvh;
      background: var(--bg);
    }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .login-header {
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .login-header .logo { font-size: 48px; }

    .login-header h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .login-header p {
      font-size: 13px;
      color: var(--muted);
    }

    .login-fields {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .login-fields label {
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      display: block;
      margin-bottom: 6px;
    }

    .login-fields input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 11px 14px;
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      outline: none;
      transition: border-color .2s;
    }

    .login-fields input:focus { border-color: var(--accent); }
    .login-fields input::placeholder { color: var(--muted); }

    .btn-login {
      background: var(--accent);
      border: none;
      border-radius: 10px;
      padding: 13px;
      color: #fff;
      font-family: var(--font);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      transition: background .15s, transform .1s;
    }

    .btn-login:hover { background: #5a52e0; }
    .btn-login:active { transform: scale(.98); }
    .btn-login:disabled { background: var(--border); cursor: not-allowed; }

    .login-error {
      font-size: 13px;
      color: #f87171;
      text-align: center;
      min-height: 18px;
    }

    /* ── APP (oculta hasta login) ── */
    #app { display: none; flex-direction: column; height: 100dvh; }
    #app.visible { display: flex; }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    header .logo { font-size: 24px; }

    header h1 {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    header .header-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    header .username-badge {
      font-size: 13px;
      color: var(--accent2);
      font-weight: 600;
    }

    .btn-logout {
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 5px 12px;
      color: var(--muted);
      font-size: 12px;
      cursor: pointer;
      transition: background .15s;
    }

    .btn-logout:hover { background: rgba(255,255,255,.06); color: var(--text); }

    /* ── Layout ── */
    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    aside {
      width: 260px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 20px 16px;
      gap: 20px;
      overflow-y: auto;
    }

    aside h2 {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
    }

    .agent-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .agent-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: var(--muted);
      padding: 8px 10px;
      border-radius: 8px;
      transition: background .15s;
    }

    .agent-item.active {
      background: rgba(108, 99, 255, .15);
      color: var(--accent2);
    }

    .agent-icon { font-size: 16px; }

    /* ── Upload ── */
    .upload-area {
      border: 1.5px dashed var(--border);
      border-radius: var(--radius);
      padding: 16px;
      text-align: center;
      cursor: pointer;
      transition: border-color .2s, background .2s;
      font-size: 13px;
      color: var(--muted);
    }

    .upload-area:hover {
      border-color: var(--accent);
      background: rgba(108, 99, 255, .05);
    }

    #file-input { display: none; }

    .upload-status {
      font-size: 12px;
      margin-top: 8px;
      color: var(--muted);
      min-height: 18px;
    }

    /* ── File list ── */
    #file-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .file-pill {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255,255,255,.04);
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 12px;
    }

    .file-pill button {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
    }

    .file-pill button:hover { color: #f87171; }

    /* ── Clear button ── */
    .btn-clear {
      margin-top: auto;
      background: rgba(255,255,255,.05);
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 8px;
      padding: 8px 12px;
      cursor: pointer;
      font-size: 13px;
      width: 100%;
      transition: background .15s;
    }

    .btn-clear:hover { background: rgba(255,255,255,.1); }

    .btn-tool {
      background: rgba(108, 99, 255, .1);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: 10px 14px;
      cursor: pointer;
      font-size: 13px;
      font-family: var(--font);
      width: 100%;
      text-align: left;
      transition: background .15s;
    }

    .btn-tool:hover { background: rgba(108, 99, 255, .2); }

    /* ── Chat area ── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scroll-behavior: smooth;
    }

    /* ── Messages ── */
    .msg {
      display: flex;
      flex-direction: column;
      max-width: 720px;
    }

    .msg.user { align-self: flex-end; align-items: flex-end; }
    .msg.bot  { align-self: flex-start; align-items: flex-start; }

    .bubble {
      padding: 14px 18px;
      border-radius: var(--radius);
      line-height: 1.6;
      font-size: 14px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg.user .bubble {
      background: var(--user-bg);
      border: 1px solid #2e4070;
      border-bottom-right-radius: 4px;
    }

    .msg.bot .bubble {
      background: var(--bot-bg);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    /* ── Chips de agentes ── */
    .agents-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 6px;
    }

    .chip {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 20px;
      background: rgba(108, 99, 255, .15);
      color: var(--accent2);
    }

    /* ── Confidence ── */
    .meta {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 6px;
      font-size: 12px;
      color: var(--muted);
    }

    .conf-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 4px;
    }

    .conf-high { background: #22c55e; }
    .conf-mid  { background: #eab308; }
    .conf-low  { background: #ef4444; }

    /* ── Sources ── */
    details { margin-top: 8px; }
    summary {
      cursor: pointer;
      font-size: 12px;
      color: var(--muted);
      list-style: none;
    }

    summary::-webkit-details-marker { display: none; }

    .sources-list {
      margin-top: 6px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .sources-list a {
      font-size: 12px;
      color: var(--accent2);
      text-decoration: none;
      word-break: break-all;
    }

    .sources-list a:hover { text-decoration: underline; }

    /* ── Image preview ── */
    .msg img {
      margin-top: 10px;
      max-width: 300px;
      border-radius: 8px;
      border: 1px solid var(--border);
    }

    /* ── Typing indicator ── */
    .typing .bubble {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 14px 18px;
    }

    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent2);
      animation: bounce .9s infinite;
    }

    .dot:nth-child(2) { animation-delay: .15s; }
    .dot:nth-child(3) { animation-delay: .3s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: .5; }
      40%            { transform: translateY(-6px); opacity: 1; }
    }

    /* ── Input bar ── */
    .input-bar {
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    #user-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      resize: none;
      outline: none;
      max-height: 140px;
      line-height: 1.5;
      transition: border-color .2s;
    }

    #user-input:focus { border-color: var(--accent); }
    #user-input::placeholder { color: var(--muted); }

    .btn-send {
      background: var(--accent);
      border: none;
      border-radius: 10px;
      width: 44px; height: 44px;
      cursor: pointer;
      color: #fff;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background .15s, transform .1s;
    }

    .btn-send:hover  { background: #5a52e0; }
    .btn-send:active { transform: scale(.95); }
    .btn-send:disabled { background: var(--border); cursor: not-allowed; }

    /* ── Scrollbar ── */
    #messages::-webkit-scrollbar { width: 5px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── Responsive ── */
    @media (max-width: 640px) {
      aside { display: none; }
    }
  </style>
</head>
<body>

<!-- ── LOGIN SCREEN ── -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-header">
      <span class="logo">🤖</span>
      <h1>Multi-Agent AI</h1>
      <p>Ingresá tu nombre y la contraseña para continuar</p>
    </div>
    <div class="login-fields">
      <div>
        <label>Nombre de usuario</label>
        <input type="text" id="login-username" placeholder="Tu nombre" autocomplete="off" />
      </div>
      <div>
        <label>Contraseña</label>
        <input type="password" id="login-password" placeholder="••••••••" onkeydown="loginOnEnter(event)" />
      </div>
    </div>
    <div class="login-error" id="login-error"></div>
    <button class="btn-login" id="btn-login" onclick="doLogin()">Ingresar</button>
  </div>
</div>

<!-- ── APP ── -->
<div id="app">

  <header>
    <span class="logo">🤖</span>
    <h1>Multi-Agent AI</h1>
    <div class="header-right">
      <span class="username-badge" id="header-username"></span>
      <button class="btn-logout" onclick="doLogout()">Salir</button>
    </div>
  </header>

  <div class="layout">

    <!-- ── Sidebar ── -->
    <aside>
      <div>
        <h2>Agentes</h2>
        <div class="agent-list" id="agent-list">
          <div class="agent-item" data-agent="researcher">
            <span class="agent-icon">🔍</span> Researcher
          </div>
          <div class="agent-item" data-agent="file_manager">
            <span class="agent-icon">📁</span> File Manager
          </div>
          <div class="agent-item" data-agent="image_agent">
            <span class="agent-icon">🎨</span> Image Agent
          </div>
          <div class="agent-item" data-agent="sql">
            <span class="agent-icon">🗄️</span> SQL Agent
          </div>
          <div class="agent-item" data-agent="analyst">
            <span class="agent-icon">🧠</span> Analyst
          </div>
        </div>
      </div>

      <div>
        <h2>Herramientas</h2>
        <div style="display:flex; flex-direction:column; gap:8px; margin-top:4px;">
          <button class="btn-tool" onclick="window.location.href='storage.html'">
            📁 Storage
          </button>
          <button class="btn-tool" onclick="window.location.href='database.html'">
            🗄️ Database
          </button>
        </div>
      </div>

      <button class="btn-clear" onclick="clearChat()">🗑️ Limpiar conversación</button>
    </aside>

    <!-- ── Chat ── -->
    <main>
      <div id="messages"></div>
      <div class="input-bar">
        <textarea id="user-input" rows="1"
          placeholder="Escribí tu consulta..." onkeydown="handleKey(event)"></textarea>
        <button class="btn-send" id="btn-send" onclick="sendMessage()">➤</button>
      </div>
    </main>

  </div>
</div>

<script>
  const API_URL =  "https://XXXXXXXXX";

  let history = [];
  let currentUser = null;

  const AGENT_LABELS = {
    researcher:   "🔍 Researcher",
    file_manager: "📁 File Manager",
    image_agent:  "🎨 Image Agent",
    sql:          "🗄️ SQL Agent",
    analyst:      "🧠 Analyst",
  };

  // ── Login ────────────────────────────────────────────────────
  function loginOnEnter(e) {
    if (e.key === "Enter") doLogin();
  }

  async function doLogin() {
    const username = document.getElementById("login-username").value.trim();
    const password = document.getElementById("login-password").value;
    const errorEl = document.getElementById("login-error");
    const btnLogin = document.getElementById("btn-login");

    errorEl.textContent = "";

    if (!username) { errorEl.textContent = "Ingresá tu nombre de usuario."; return; }
    if (!password) { errorEl.textContent = "Ingresá la contraseña."; return; }

    btnLogin.disabled = true;
    btnLogin.textContent = "Ingresando...";

    try {
      const res = await fetch(`${API_URL}/login`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password }),
      });

      const data = await res.json();

      if (!data.ok) {
        errorEl.textContent = data.message;
        return;
      }

      // Login exitoso
      currentUser = username;
      sessionStorage.setItem("username", username);
      await initApp();

    } catch (err) {
      errorEl.textContent = `Error de conexión: ${err.message}`;
    } finally {
      btnLogin.disabled = false;
      btnLogin.textContent = "Ingresar";
    }
  }

  async function initApp() {
    // Mostrar app, ocultar login
    document.getElementById("login-screen").style.display = "none";
    document.getElementById("app").classList.add("visible");
    document.getElementById("header-username").textContent = `👤 ${currentUser}`;

    // Cargar historial previo
    await loadHistorial();

    // Si no había historial, mostrar saludo
    if (history.length === 0) {
      addWelcomeMessage();
    }

    loadFileList();
  }

  function addWelcomeMessage() {
    const msgs = document.getElementById("messages");
    const div = document.createElement("div");
    div.className = "msg bot";
    div.innerHTML = `<div class="bubble">¡Hola, ${escapeHtml(currentUser)}! Soy tu asistente multi-agente. Puedo buscar en internet, consultar tu base de datos, leer y escribir archivos, y generar imágenes. ¿En qué te ayudo?</div>`;
    msgs.appendChild(div);
    scrollToBottom();
  }

  async function loadHistorial() {
    try {
      const res = await fetch(`${API_URL}/historial/${encodeURIComponent(currentUser)}`);
      if (!res.ok) return;
      const data = await res.json();
      const mensajes = data.historial || [];

      history = mensajes.map(m => ({ role: m.role, content: m.content }));

      // Renderizar historial en pantalla
      mensajes.forEach(m => {
        if (m.role === "user") {
          addMessage("user", m.content);
        } else {
          addMessage("bot", m.content);
        }
      });

    } catch (_) {}
  }

  function doLogout() {
    sessionStorage.removeItem("username");
    currentUser = null;
    history = [];
    document.getElementById("messages").innerHTML = "";
    document.getElementById("app").classList.remove("visible");
    document.getElementById("login-screen").style.display = "flex";
    document.getElementById("login-password").value = "";
    document.getElementById("login-error").textContent = "";
  }

  // ── Auto-resize textarea ────────────────────────────────────
  const textarea = document.getElementById("user-input");
  textarea.addEventListener("input", () => {
    textarea.style.height = "auto";
    textarea.style.height = Math.min(textarea.scrollHeight, 140) + "px";
  });

  function handleKey(e) {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  // ── Send message ────────────────────────────────────────────
  async function sendMessage() {
    const input = document.getElementById("user-input");
    const text = input.value.trim();
    if (!text) return;

    input.value = "";
    input.style.height = "auto";

    addMessage("user", text);
    history.push({ role: "user", content: text });

    setActiveAgents([]);
    const typingEl = addTyping();
    setLoading(true);

    try {
      const res = await fetch(`${API_URL}/chat`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text, history, username: currentUser }),
      });

      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();

      typingEl.remove();
      addBotMessage(data);
      history.push({ role: "assistant", content: data.answer });

      if (history.length > 20) history = history.slice(-20);

      setActiveAgents(data.agents_used || []);

    } catch (err) {
      typingEl.remove();
      addMessage("bot", `❌ Error de conexión: ${err.message}\n\nVerificá que el backend esté corriendo en ${API_URL}`);
    } finally {
      setLoading(false);
    }
  }

  // ── Render helpers ──────────────────────────────────────────
  function addMessage(role, text) {
    const msgs = document.getElementById("messages");
    const div = document.createElement("div");
    div.className = `msg ${role === "user" ? "user" : "bot"}`;
    div.innerHTML = `<div class="bubble">${escapeHtml(text)}</div>`;
    msgs.appendChild(div);
    scrollToBottom();
    return div;
  }

  function addBotMessage(data) {
    const msgs = document.getElementById("messages");
    const div = document.createElement("div");
    div.className = "msg bot";

    const chips = (data.agents_used || [])
      .map(a => `<span class="chip">${AGENT_LABELS[a] || a}</span>`)
      .join("");


    let sourcesHtml = "";
    if (data.sources && data.sources.length > 0) {
      const links = data.sources.map(s =>
        `<a href="${escapeHtml(s)}" target="_blank" rel="noopener">${escapeHtml(s)}</a>`
      ).join("");
      sourcesHtml = `
        <details>
          <summary>🔎 ${data.sources.length} fuente(s)</summary>
          <div class="sources-list">${links}</div>
        </details>`;
    }

    let imgHtml = "";
    if (data.image_url) {
      imgHtml = `<img src="${escapeHtml(data.image_url)}" alt="Imagen generada" loading="lazy" />`;
    }

    div.innerHTML = `
      ${chips ? `<div class="agents-row">${chips}</div>` : ""}
      <div class="bubble">${escapeHtml(data.answer)}</div>
      ${imgHtml}
      ${sourcesHtml}
    `;

    msgs.appendChild(div);
    scrollToBottom();
  }

  function addTyping() {
    const msgs = document.getElementById("messages");
    const div = document.createElement("div");
    div.className = "msg bot typing";
    div.innerHTML = `<div class="bubble">
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
    </div>`;
    msgs.appendChild(div);
    scrollToBottom();
    return div;
  }

  function scrollToBottom() {
    const msgs = document.getElementById("messages");
    msgs.scrollTop = msgs.scrollHeight;
  }

  function setLoading(on) {
    document.getElementById("btn-send").disabled = on;
    document.getElementById("user-input").disabled = on;
  }

  function setActiveAgents(agents) {
    document.querySelectorAll(".agent-item").forEach(el => {
      el.classList.toggle("active", agents.includes(el.dataset.agent));
    });
  }

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  // ── Clear chat ──────────────────────────────────────────────
  async function clearChat() {
    history = [];
    const msgs = document.getElementById("messages");
    msgs.innerHTML = "";
    addWelcomeMessage();
    setActiveAgents([]);

    // Borrar historial de Supabase
    if (currentUser) {
      try {
        await fetch(`${API_URL}/historial/${encodeURIComponent(currentUser)}`, {
          method: "DELETE",
        });
      } catch (err) {
        console.error("Error borrando historial:", err);
      }
    }
  }

  // ── Init ─────────────────────────────────────────────────────
  // Verificar si ya hay sesión guardada
  window.addEventListener("load", () => {
    const savedUser = sessionStorage.getItem("username");
    if (savedUser) {
      currentUser = savedUser;
      document.getElementById("login-username").value = savedUser;
      initApp();
    }
  });
</script>
</body>
</html>
