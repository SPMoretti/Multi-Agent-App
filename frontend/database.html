<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Database — Multi-Agent AI</title>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:#0f1117; --surface:#1a1d27; --border:#2e3148;
      --accent:#6c63ff; --accent2:#a78bfa;
      --text:#e2e8f0; --muted:#94a3b8; --danger:#f87171;
      --success:#34d399;
      --radius:12px;
    }

    body {
      font-family: system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    header a { color: var(--muted); text-decoration: none; font-size: 13px; }
    header a:hover { color: var(--text); }
    header h1 { font-size: 17px; font-weight: 700; }

    .toolbar-global { margin-left: auto; display: flex; gap: 8px; }

    /* Item 4: botones siempre visibles; opacidad controlada por :disabled */
    .toolbar-btn {
      background: rgba(255,255,255,.05);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      padding: 6px 14px;
      font-size: 12px;
      cursor: pointer;
      transition: background .15s, opacity .15s;
    }
    .toolbar-btn:hover:not(:disabled) { background: rgba(255,255,255,.1); }
    .toolbar-btn:disabled { opacity: .30; cursor: not-allowed; }

    /* ── LAYOUT ── */
    .layout { display: flex; flex: 1; overflow: hidden; }

    /* ── SIDEBAR ── */
    .tables-sidebar {
      width: 220px;
      border-right: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex-shrink: 0;
    }

    .sidebar-title {
      font-size: 11px;
      padding: 18px 16px 8px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .5px;
      flex-shrink: 0;
    }

    /* Item 3: scroll area captura clicks para deseleccionar */
    .table-list-scroll {
      overflow-y: auto;
      flex: 1;
      cursor: default;
    }

    .table-item {
      padding: 9px 16px;
      cursor: pointer;
      color: var(--muted);
      font-size: 13px;
      border-left: 3px solid transparent;
      transition: background .12s, color .12s;
      user-select: none;
    }
    .table-item:hover { background: rgba(255,255,255,.04); color: var(--text); }
    .table-item.active {
      background: rgba(108,99,255,.1);
      color: var(--accent2);
      border-left-color: var(--accent);
    }

    /* ── DATA AREA ── */
    .data-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    .state-msg {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      color: var(--muted);
      gap: 10px;
      text-align: center;
      font-size: 14px;
    }

    /* ── TABLE TOOLBAR ── */
    .table-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
      gap: 12px;
      flex-wrap: wrap;
    }

    .table-meta { font-size: 13px; display: flex; align-items: center; gap: 10px; }
    .table-meta strong { color: var(--text); }
    .table-meta span   { color: var(--muted); font-size: 12px; }

    .pagination { display: flex; align-items: center; gap: 8px; }
    .pagination span {
      font-size: 12px; color: var(--muted);
      min-width: 80px; text-align: center;
    }

    .page-btn {
      background: rgba(255,255,255,.05);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      padding: 5px 10px;
      font-size: 13px;
      cursor: pointer;
      transition: background .12s;
    }
    .page-btn:hover:not(:disabled) { background: rgba(108,99,255,.2); border-color: var(--accent); }
    .page-btn:disabled { opacity: .3; cursor: not-allowed; }

    /* ── TABLE WRAPPER ── */
    .table-wrapper { flex: 1; overflow: auto; position: relative; }

    table.data-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      min-width: max-content;
    }

    table.data-table thead {
      position: sticky; top: 0; z-index: 2;
      background: var(--surface);
    }

    table.data-table thead th {
      padding: 10px 14px;
      text-align: left;
      font-size: 11px; font-weight: 600;
      color: var(--muted);
      text-transform: uppercase; letter-spacing: .4px;
      border-bottom: 1px solid var(--border);
      white-space: nowrap; user-select: none;
    }

    table.data-table tbody tr {
      border-bottom: 1px solid rgba(46,49,72,.5);
      transition: background .1s;
    }
    table.data-table tbody tr:last-child { border-bottom: none; }
    table.data-table tbody tr:hover { background: rgba(255,255,255,.025); }

    table.data-table tbody td {
      padding: 9px 14px; color: var(--text);
      max-width: 320px; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap;
    }

    table.data-table tbody td.null-cell {
      color: var(--muted); font-style: italic; font-size: 11px;
    }

    .empty-row td { text-align: center; color: var(--muted); padding: 32px; }

    /* ── TOAST ── */
    #toast {
      position: fixed; bottom: 28px; left: 50%;
      transform: translateX(-50%);
      background: #1e2235;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 20px;
      font-size: 13px;
      opacity: 0; transition: opacity .25s;
      pointer-events: none; z-index: 100;
      max-width: 560px; text-align: center; line-height: 1.5;
      white-space: pre-line;
    }
    #toast.show    { opacity: 1; }
    #toast.error   { color: var(--danger);  border-color: rgba(248,113,113,.4); }
    #toast.success { color: var(--success); border-color: rgba(52,211,153,.3); }
  </style>
</head>

<body>

<header>
  <a href="index.html">← Volver</a>
  <h1>🗄️ Database</h1>

  <!-- Item 4: ambos botones siempre presentes; estado manejado por updateToolbar() -->
  <div class="toolbar-global">
    <button class="toolbar-btn" id="btn-export" onclick="exportCSV()">⬇️ Exportar CSV</button>
    <button class="toolbar-btn" id="btn-import" onclick="triggerImport()">⬆️ Importar CSV</button>
  </div>
</header>

<div class="layout">

  <!-- Sidebar — Item 3: click fuera de .table-item deselecciona -->
  <div class="tables-sidebar">
    <div class="sidebar-title">Tablas</div>
    <div class="table-list-scroll" onclick="handleSidebarClick(event)">
      <div id="table-list"></div>
    </div>
  </div>

  <!-- Data area -->
  <div class="data-area" id="data-area">
    <div id="drop-zone" class="state-msg"
      ondragover="handleDragOver(event)"
      ondrop="handleDrop(event)">
      <span style="font-size:32px;">📂</span>
      <span>Seleccioná una tabla o arrastrá un CSV aquí</span>
      <span style="font-size:12px; margin-top:4px;">Para crear una tabla nueva, usá "Importar CSV"</span>
    </div>
  </div>

</div>

<input type="file" id="csv-input" accept=".csv" hidden>
<div id="toast"></div>


<script>
const API_URL     = "https://XXXXXXXXX";
const currentUser = sessionStorage.getItem("username");

let currentTable = null;
let currentPage  = 1;
let totalPages   = 1;

if (!currentUser) {
  document.body.innerHTML = '<p style="padding:40px;color:#f87171">No autenticado. <a href="index.html" style="color:#a78bfa">Ir al chat →</a></p>';
} else {
  updateToolbar();
  loadTables();
}

// ── TOOLBAR (items 2 y 4) ─────────────────────────────────────
// Exportar: activo solo con tabla seleccionada
// Importar: activo solo sin tabla seleccionada
function updateToolbar() {
  document.getElementById("btn-export").disabled = !currentTable;
  document.getElementById("btn-import").disabled = !!currentTable;
}

// ── TOAST ─────────────────────────────────────────────────────
function showToast(msg, type = "info") {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "show " + type;
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.className = ""; }, 4500);
}

// ── CARGAR TABLAS ─────────────────────────────────────────────
async function loadTables() {
  try {
    const res  = await fetch(`${API_URL}/tables/${currentUser}`);
    const data = await res.json();
    const list = document.getElementById("table-list");

    if (!data.tables.length) {
      list.innerHTML = `
        <div style="padding:14px 16px; color:var(--muted); font-size:13px; line-height:1.6">
          No hay tablas.<br><br>
          👉 Importá un CSV para crear la primera.
        </div>`;
      return;
    }

    list.innerHTML = data.tables
      .map(t => `<div class="table-item" data-table="${escHtml(t)}" onclick="selectTable('${escHtml(t)}', this)">${escHtml(t)}</div>`)
      .join("");

  } catch (e) {
    showToast("Error cargando tablas", "error");
  }
}

// ── SELECCIONAR TABLA ─────────────────────────────────────────
function selectTable(name, el) {
  currentTable = name;
  currentPage  = 1;
  document.querySelectorAll(".table-item").forEach(i => i.classList.remove("active"));
  el.classList.add("active");
  updateToolbar();
  loadTableData();
}

// ── DESELECCIONAR (item 3) ────────────────────────────────────
// Click en el área del sidebar que NO sea un .table-item → deselecciona
function handleSidebarClick(e) {
  if (!e.target.classList.contains("table-item")) {
    deselect();
  }
}

function deselect() {
  if (!currentTable) return;
  currentTable = null;
  currentPage  = 1;
  document.querySelectorAll(".table-item").forEach(i => i.classList.remove("active"));
  updateToolbar();
  document.getElementById("data-area").innerHTML = `
    <div id="drop-zone" class="state-msg"
      ondragover="handleDragOver(event)"
      ondrop="handleDrop(event)">
      <span style="font-size:32px;">📂</span>
      <span>Seleccioná una tabla o arrastrá un CSV aquí</span>
      <span style="font-size:12px; margin-top:4px;">Para crear una tabla nueva, usá "Importar CSV"</span>
    </div>`;
}

// ── CARGAR DATOS ─────────────────────────────────────────────
async function loadTableData(page = currentPage) {
  document.getElementById("data-area").innerHTML =
    `<div class="state-msg"><span>⏳ Cargando datos...</span></div>`;

  try {
    const res  = await fetch(
      `${API_URL}/tables/${currentUser}/${currentTable}?page=${page}&page_size=100`
    );
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || "Error desconocido");

    currentPage = data.page;
    totalPages  = data.total_pages;
    renderTable(data);

  } catch (err) {
    document.getElementById("data-area").innerHTML =
      `<div class="state-msg"><span style="color:var(--danger)">❌ ${escHtml(err.message)}</span></div>`;
  }
}

// ── RENDER TABLE ──────────────────────────────────────────────
function renderTable(data) {
  const headerCells = data.columns
    .map(c => `<th title="${escHtml(c)}">${escHtml(c)}</th>`)
    .join("");

  const bodyRows = data.rows.length
    ? data.rows.map(row => `<tr>${
        row.map(cell =>
          cell === null || cell === ""
            ? `<td class="null-cell">null</td>`
            : `<td title="${escHtml(String(cell))}">${escHtml(String(cell))}</td>`
        ).join("")
      }</tr>`).join("")
    : `<tr class="empty-row"><td colspan="${data.columns.length}">Sin datos en esta página</td></tr>`;

  document.getElementById("data-area").innerHTML = `
    <div class="table-toolbar">
      <div class="table-meta">
        <strong>📋 ${escHtml(currentTable)}</strong>
        <span>${data.total.toLocaleString()} filas · ${data.columns.length} columnas</span>
      </div>
      <div class="pagination">
        <button class="page-btn" onclick="changePage(${currentPage - 1})"
          ${currentPage <= 1 ? "disabled" : ""}>&#8592;</button>
        <span>Pág. ${currentPage} / ${totalPages}</span>
        <button class="page-btn" onclick="changePage(${currentPage + 1})"
          ${currentPage >= totalPages ? "disabled" : ""}>&#8594;</button>
      </div>
    </div>
    <div class="table-wrapper">
      <table class="data-table">
        <thead><tr>${headerCells}</tr></thead>
        <tbody>${bodyRows}</tbody>
      </table>
    </div>`;
}

function changePage(page) {
  if (page < 1 || page > totalPages) return;
  currentPage = page;
  loadTableData(page);
}

// ── IMPORT (items 1 y 2) ──────────────────────────────────────
function triggerImport() {
  // Item 2: bloqueado si hay tabla seleccionada (refuerza el disabled del botón)
  if (currentTable) {
    showToast("Deseleccioná la tabla actual antes de importar un CSV nuevo", "error");
    return;
  }

  // Item 1: pedir nombre de tabla antes de abrir el selector de archivo
  let tableName = prompt("Nombre de la nueva tabla\n(solo letras minúsculas, números y guion bajo _):");
  if (tableName === null) return;  // usuario canceló

  tableName = tableName.trim().toLowerCase();

  if (!tableName) {
    showToast("El nombre no puede estar vacío", "error");
    return;
  }
  if (!/^[a-z0-9_]+$/.test(tableName)) {
    showToast("Nombre inválido — solo letras minúsculas, números y _ (guion bajo)", "error");
    return;
  }

  const input = document.getElementById("csv-input");
  input.dataset.table = tableName;
  input.click();
}

document.getElementById("csv-input").addEventListener("change", e => {
  const file = e.target.files[0];
  if (!file) return;
  uploadCSV(file, e.target.dataset.table);
  e.target.value = "";
});

async function uploadCSV(file, tableName) {
  showToast("⏳ Importando CSV...");

  const formData = new FormData();
  formData.append("file", file);

  try {
    const res  = await fetch(
      `${API_URL}/tables/${currentUser}/${tableName}/import`,
      { method: "POST", body: formData }
    );
    const data = await res.json();

    if (!res.ok) {
      const detail = data.detail || "Error importando";

      // Item 1: si el error es de estructura/columnas, sugerir revisar el delimitador
      const esProblemaEstructura =
        detail.toLowerCase().includes("columna") ||
        detail.toLowerCase().includes("coincide") ||
        detail.toLowerCase().includes("vacío") ||
        detail.toLowerCase().includes("encabezado");

      const extra = esProblemaEstructura
        ? "\n\nVerificá que el CSV tenga encabezados en la primera fila y use coma (,) o punto y coma (;) como separador."
        : "";

      showToast(`❌ ${detail}${extra}`, "error");
      return;
    }

    showToast(`✅ ${data.rows_inserted} filas importadas en "${tableName}"`, "success");
    await loadTables();

    // Auto-seleccionar la tabla recién importada
    const items = document.querySelectorAll(".table-item");
    for (const item of items) {
      if (item.dataset.table === tableName) {
        selectTable(tableName, item);
        break;
      }
    }

  } catch (err) {
    showToast("❌ " + err.message, "error");
  }
}

// ── EXPORT ───────────────────────────────────────────────────
async function exportCSV() {
  if (!currentTable) {
    showToast("Seleccioná una tabla primero", "error");
    return;
  }
  try {
    const res = await fetch(`${API_URL}/tables/${currentUser}/${currentTable}/export`);
    if (!res.ok) throw new Error("Error al exportar");
    const blob = await res.blob();
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href = url; a.download = currentTable + ".csv"; a.click();
    showToast("✅ CSV descargado", "success");
  } catch (err) {
    showToast("❌ " + err.message, "error");
  }
}

// ── DRAG & DROP ───────────────────────────────────────────────
function handleDragOver(e) { e.preventDefault(); }

function handleDrop(e) {
  e.preventDefault();

  // Item 2: no permitir drop si hay tabla seleccionada
  if (currentTable) {
    showToast("Deseleccioná la tabla actual antes de importar un CSV nuevo", "error");
    return;
  }

  const file = e.dataTransfer.files[0];
  if (!file) return;
  if (!file.name.endsWith(".csv")) { showToast("Solo archivos CSV", "error"); return; }

  let tableName = prompt("Nombre de la nueva tabla\n(solo letras minúsculas, números y guion bajo _):");
  if (tableName === null) return;
  tableName = tableName.trim().toLowerCase();
  if (!tableName || !/^[a-z0-9_]+$/.test(tableName)) {
    showToast("Nombre inválido", "error");
    return;
  }

  uploadCSV(file, tableName);
}

// ── UTILS ─────────────────────────────────────────────────────
function escHtml(str) {
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}
</script>

</body>
</html>
